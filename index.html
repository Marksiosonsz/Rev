<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --card: #1f1f25;
    --border: #2e2e38;
    --accent: #f0e040;
    --accent2: #e05a2b;
    --text: #e8e8ea;
    --muted: #6b6b78;
    --green: #3ecf8e;
    --red: #f25757;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,16,.85);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: .08em;
    color: var(--accent);
  }
  .logo span { color: var(--accent2); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .pill {
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: .06em;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 20px 32px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 22px;
    border-radius: 8px 8px 0 0;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    cursor: pointer;
    transition: color .2s, background .2s;
    position: relative;
    top: 1px;
  }
  .tab.active {
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-color: var(--surface);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── MAIN CONTENT ── */
  main { flex: 1; padding: 32px; max-width: 900px; width: 100%; margin: 0 auto; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── ADD CARD PANEL ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 8px; }
  textarea, input[type="text"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    padding: 14px 16px;
    resize: vertical;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  textarea:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,224,64,.08);
  }
  textarea { min-height: 90px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0e0e10; }
  .btn-primary:hover { opacity: .9; }
  .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 7px 16px; font-size: .8rem; border-radius: 7px; }
  .btn-danger:hover { background: rgba(242,87,87,.08); }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); }

  /* ── CARD LIST ── */
  .cards-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 999px;
    color: var(--muted);
  }
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .card-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    transition: border-color .2s;
  }
  .card-item:hover { border-color: #3a3a4a; }
  .card-item-body { flex: 1; min-width: 0; }
  .card-q {
    font-size: .92rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-word;
  }
  .card-a {
    font-size: .82rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    min-width: 24px;
    text-align: right;
    padding-top: 2px;
  }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: .9rem; line-height: 1.8;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── REVIEW PANEL ── */
  .review-controls {
    display: flex; gap: 10px; align-items: center; margin-bottom: 28px; flex-wrap: wrap;
  }
  .progress-bar-wrap {
    flex: 1; min-width: 160px;
    height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent); border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .progress-text {
    font-family: 'DM Mono', monospace; font-size: .75rem; color: var(--muted);
    white-space: nowrap;
  }

  /* question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px;
    margin: 0 auto 22px;
    max-width: 640px;
    text-align: center;
    animation: fadeIn .25s ease;
  }
  .q-card-label {
    font-family: 'DM Mono', monospace;
    font-size: .65rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  .q-card-text {
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    font-weight: 500; line-height: 1.5; color: var(--text);
  }

  /* answer input area */
  .answer-area {
    max-width: 640px; margin: 0 auto 18px;
  }
  .answer-input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .answer-input-wrap textarea {
    flex: 1; min-height: 60px; resize: none;
    border-radius: 12px;
    font-size: .95rem;
  }
  .btn-submit {
    background: var(--accent); color: #0e0e10;
    padding: 14px 22px; border-radius: 12px;
    font-size: .9rem; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
  .btn-submit:hover { opacity: .9; }

  /* result reveal */
  .result-box {
    max-width: 640px; margin: 0 auto 18px;
    border-radius: 14px; padding: 20px 24px;
    display: none; animation: fadeIn .2s ease;
  }
  .result-box.correct {
    background: rgba(62,207,142,.08);
    border: 1px solid rgba(62,207,142,.3);
  }
  .result-box.wrong {
    background: rgba(242,87,87,.07);
    border: 1px solid rgba(242,87,87,.25);
  }
  .result-tag {
    font-family: 'DM Mono', monospace;
    font-size: .68rem; letter-spacing: .12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-box.correct .result-tag { color: var(--green); }
  .result-box.wrong   .result-tag { color: var(--red); }
  .result-correct-ans {
    font-size: .9rem; color: var(--text); line-height: 1.5;
  }
  .result-your-ans {
    font-size: .82rem; color: var(--muted);
    margin-top: 6px; font-style: italic;
  }

  .review-next-row {
    max-width: 640px; margin: 0 auto;
    display: none; justify-content: flex-end; gap: 10px;
  }

  .review-done {
    text-align: center; padding: 50px 20px;
    animation: fadeIn .3s ease;
  }
  .review-done h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem; letter-spacing: .06em;
    color: var(--accent); margin-bottom: 10px;
  }
  .review-done p { color: var(--muted); font-size: .95rem; margin-bottom: 24px; }
  .score { font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
  .score strong { color: var(--green); }

  /* shuffle toggle */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle-wrap label { font-size: .82rem; color: var(--muted); cursor: pointer; }
  .toggle {
    appearance: none; width: 34px; height: 18px;
    background: var(--border); border-radius: 99px;
    cursor: pointer; position: relative; transition: background .2s;
  }
  .toggle::before {
    content: ''; position: absolute;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; top: 3px; left: 3px;
    transition: transform .2s;
  }
  .toggle:checked { background: var(--accent); }
  .toggle:checked::before { transform: translateX(16px); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo">Flash<span>.</span>Rev</div>
  <div class="header-right">
    <span class="pill" id="totalPill">0 cards</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">＋ Add Cards</button>
  <button class="tab" onclick="switchTab('list')">My Cards</button>
  <button class="tab" onclick="switchTab('review')">Review</button>
</div>

<main>

  <!-- ADD PANEL -->
  <div class="panel active" id="panel-add">
    <div class="section-label">New Flashcard</div>
    <div class="form-group">
      <label>Question / Description</label>
      <textarea id="inputQ" placeholder="e.g. What is the powerhouse of the cell?"></textarea>
    </div>
    <div class="form-group">
      <label>Answer</label>
      <textarea id="inputA" placeholder="e.g. The mitochondria"></textarea>
    </div>
    <button class="btn btn-primary" onclick="addCard()">Add Card</button>
    <span id="addFeedback" style="margin-left:14px;font-size:.82rem;color:var(--green);opacity:0;transition:opacity .3s;">Saved!</span>
  </div>

  <!-- LIST PANEL -->
  <div class="panel" id="panel-list">
    <div class="cards-header">
      <div class="section-label" style="margin:0;">All Cards</div>
      <span class="count-badge" id="listCount">0</span>
    </div>
    <div class="card-list" id="cardList">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        No cards yet. Add some from the <b>Add Cards</b> tab.
      </div>
    </div>
  </div>

  <!-- REVIEW PANEL -->
  <div class="panel" id="panel-review">
    <div id="reviewStart">
      <div class="section-label">Review Session</div>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:20px;">Type your answer and hit Submit. You'll see the correct answer and whether you got it right.</p>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px;">
        <div class="toggle-wrap">
          <input type="checkbox" class="toggle" id="shuffleToggle" checked>
          <label for="shuffleToggle">Shuffle cards</label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startReview()">Start Review →</button>
    </div>

    <div id="reviewSession" style="display:none;">
      <div class="review-controls">
        <span class="progress-text" id="progressText">0 / 0</span>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:.8rem;" onclick="endReview()">End</button>
      </div>

      <!-- Question -->
      <div class="q-card">
        <div class="q-card-label">Question</div>
        <div class="q-card-text" id="cardQ">—</div>
      </div>

      <!-- Answer input -->
      <div class="answer-area">
        <div class="answer-input-wrap">
          <textarea id="userAnswer" placeholder="Type your answer here…" rows="2"></textarea>
          <button class="btn btn-submit" id="submitBtn" onclick="submitAnswer()">Submit</button>
        </div>
      </div>

      <!-- Result reveal -->
      <div class="result-box" id="resultBox">
        <div class="result-tag" id="resultTag">Correct</div>
        <div class="result-correct-ans" id="resultCorrect"></div>
        <div class="result-your-ans" id="resultYours"></div>
      </div>

      <!-- Next row -->
      <div class="review-next-row" id="nextRow">
        <button class="btn btn-ghost" onclick="overrideCorrect()" id="overrideBtn" style="font-size:.82rem;padding:9px 18px;">Mark as correct</button>
        <button class="btn btn-primary" onclick="nextCard()">Next →</button>
      </div>
    </div>

    <div id="reviewDone" class="review-done" style="display:none;">
      <h2>Round Done!</h2>
      <p class="score">You got <strong id="scoreGot">0</strong> out of <span id="scoreTotal">0</span> correct.</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px;" id="reviewMsg"></p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="startReview()">Review Again</button>
        <button class="btn btn-ghost" onclick="endReview()">Back</button>
      </div>
    </div>
  </div>

</main>

<script>
const DEFAULT_CARDS = [

  {q:"It is advisable to narrow the scope of the issues into manageable portions when faced with a complex problem. where the code is divided into halves and systematically narrowing the bug location. Commenting out code, using print statements, or isolating components can help isolate the problem area quickly.",a:"Binary Search"},

  {q:"It is statements in strategic areas of the code is a good idea to provide valuable information for debugging. Understanding the code's execution flow and the values of variables at different stages allows the debugger to identify the issue.",a:"Log Analysis"},
  {q:"Group error reports into classes of related bugs as they often share common causes or patterns. Fixing a bug from a class is likely to resolve other bugs or give insights into how to fix them.",a:"Clustering Bugs"},
  {q:"Debugging can be mentally taxing after hours of trying to resolve them. It is advisable to take breaks and step away from the code to clear the mind and allow the thoughts and ideas to simmer, leading to breakthroughs based on a fresh perspective.",a:"Take Breaks"},
  {q:"Documenting the process and the solutions you used is an important technique, as it can be a valuable resource for future debugging challenges.",a:"Take Notes"},

  {q:"If an unplanned exception occurs during a program's execution, it is called",a:"runtime error"},
  {q:"otherwise, if discovered during program compilation, it is called",a:"syntax error"},
  {q:"represents more serious errors that a program usually might not recover from. For instance, an insufficient memory to execute a program.",a:"Error Class"},

  {q:"Closes the output stream and releases any system resources associated with the stream",a:"void close"},

  {q:"Writes all the bytes to the output stream from the specified byte array",a:"void write"},

// Merge: use localStorage extras on top of default cards
const savedExtra = JSON.parse(localStorage.getItem('flashcards_extra') || '[]');
let cards = [...DEFAULT_CARDS, ...savedExtra];
let reviewDeck = [];
let reviewIdx = 0;
let got = 0;

function save() {
  const extra = cards.slice(DEFAULT_CARDS.length);
  localStorage.setItem('flashcards_extra', JSON.stringify(extra));
  updatePill();
}

function updatePill() {
  const n = cards.length;
  document.getElementById('totalPill').textContent = n + (n === 1 ? ' card' : ' cards');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['add','list','review'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'list') renderList();
  if (tab === 'review') showReviewStart();
}

function addCard() {
  const q = document.getElementById('inputQ').value.trim();
  const a = document.getElementById('inputA').value.trim();
  if (!q || !a) { alert('Please fill in both the question and answer.'); return; }
  cards.push({ q, a });
  save();
  document.getElementById('inputQ').value = '';
  document.getElementById('inputA').value = '';
  document.getElementById('inputQ').focus();
  const fb = document.getElementById('addFeedback');
  fb.style.opacity = 1;
  setTimeout(() => fb.style.opacity = 0, 1800);
}

function renderList() {
  const el = document.getElementById('cardList');
  document.getElementById('listCount').textContent = cards.length;
  if (!cards.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>No cards yet. Add some from the <b>Add Cards</b> tab.</div>';
    return;
  }
  el.innerHTML = cards.map((c,i) => `
    <div class="card-item">
      <span class="card-num">${i+1}</span>
      <div class="card-item-body">
        <div class="card-q">${esc(c.q)}</div>
        <div class="card-a">${esc(c.a)}</div>
      </div>
      <button class="btn btn-danger" onclick="deleteCard(${i})">Delete</button>
    </div>
  `).join('');
}

function deleteCard(i) {
  if (!confirm('Delete this card?')) return;
  cards.splice(i,1);
  save();
  renderList();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── REVIEW ──
function showReviewStart() {
  document.getElementById('reviewStart').style.display = '';
  document.getElementById('reviewSession').style.display = 'none';
  document.getElementById('reviewDone').style.display = 'none';
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function startReview() {
  if (!cards.length) { alert('Add some cards first!'); return; }
  reviewDeck = [...cards];
  if (document.getElementById('shuffleToggle').checked) shuffle(reviewDeck);
  reviewIdx = 0; got = 0;
  document.getElementById('reviewStart').style.display = 'none';
  document.getElementById('reviewDone').style.display = 'none';
  document.getElementById('reviewSession').style.display = '';
  showCard();
}

function showCard() {
  const c = reviewDeck[reviewIdx];
  document.getElementById('cardQ').textContent = c.q;
  document.getElementById('userAnswer').value = '';
  document.getElementById('userAnswer').disabled = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').style.opacity = '1';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('nextRow').style.display = 'none';
  document.getElementById('overrideBtn').style.display = '';
  updateProgress();
  setTimeout(() => document.getElementById('userAnswer').focus(), 50);
}

function updateProgress() {
  const total = reviewDeck.length;
  const pct = (reviewIdx / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${reviewIdx} / ${total}`;
}

let lastCorrect = false;

function normalize(s) {
  return s.trim().toLowerCase().replace(/\s+/g,' ');
}

function submitAnswer() {
  const userAns = document.getElementById('userAnswer').value.trim();
  if (!userAns) { document.getElementById('userAnswer').focus(); return; }
  const c = reviewDeck[reviewIdx];
  const correct = normalize(userAns) === normalize(c.a);
  lastCorrect = correct;
  if (correct) got++;

  // disable input
  document.getElementById('userAnswer').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').style.opacity = '.4';

  // show result
  const box = document.getElementById('resultBox');
  box.className = 'result-box ' + (correct ? 'correct' : 'wrong');
  box.style.display = '';
  document.getElementById('resultTag').textContent = correct ? '✓ Correct!' : '✗ Incorrect';
  document.getElementById('resultCorrect').textContent = 'Answer: ' + c.a;
  document.getElementById('resultYours').textContent = correct ? '' : 'Your answer: ' + userAns;

  // show next row; hide override if already correct
  const nextRow = document.getElementById('nextRow');
  nextRow.style.display = 'flex';
  document.getElementById('overrideBtn').style.display = correct ? 'none' : '';
}

function overrideCorrect() {
  if (!lastCorrect) { got++; lastCorrect = true; }
  const box = document.getElementById('resultBox');
  box.className = 'result-box correct';
  document.getElementById('resultTag').textContent = '✓ Marked as correct';
  document.getElementById('overrideBtn').style.display = 'none';
}

function nextCard() {
  reviewIdx++;
  if (reviewIdx >= reviewDeck.length) {
    finishReview();
  } else {
    showCard();
  }
}

function finishReview() {
  document.getElementById('reviewSession').style.display = 'none';
  document.getElementById('reviewDone').style.display = '';
  document.getElementById('scoreGot').textContent = got;
  document.getElementById('scoreTotal').textContent = reviewDeck.length;
  const pct = Math.round(got/reviewDeck.length*100);
  let msg = pct === 100 ? '🎉 Perfect score! You\'ve mastered all cards.' :
            pct >= 70  ? '👍 Great job! Keep reviewing the ones you missed.' :
                         '📚 Keep studying — you\'ll get there!';
  document.getElementById('reviewMsg').textContent = msg;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${reviewDeck.length} / ${reviewDeck.length}`;
}

function endReview() { showReviewStart(); }

// Enter key submits, Shift+Enter = newline
document.addEventListener('keydown', e => {
  const reviewActive = document.getElementById('reviewSession').style.display !== 'none';
  if (!reviewActive) return;
  if (e.target.id === 'userAnswer' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const nextVisible = document.getElementById('nextRow').style.display === 'flex';
    if (nextVisible) nextCard(); else submitAnswer();
  }
});

updatePill();
</script>
</body>
</html>
